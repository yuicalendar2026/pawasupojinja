<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>開運コンパス</title>

<link rel="manifest" href="manifest.json">

<style>

body{
margin:0;
font-family:sans-serif;
background:#050505;
color:white;
text-align:center;
}

header{
padding:20px;
font-size:28px;
font-weight:bold;
background:linear-gradient(45deg,#d4af37,#ffd700);
color:black;
}

.sub{
font-size:14px;
}

.container{
padding:20px;
}

input,button{
padding:12px;
margin:10px;
border-radius:10px;
border:none;
font-size:16px;
}

button{
background:#ffd700;
font-weight:bold;
}

#map{
height:420px;
margin-top:20px;
}

.result{
font-size:22px;
color:#ffd700;
margin-top:10px;
}

.omikuji{
margin-top:20px;
font-size:20px;
}

.goshuin{
margin-top:20px;
padding:20px;
border:2px solid gold;
border-radius:10px;
}

.luckday{
margin-top:30px;
font-size:18px;
color:#ffd700;
}

</style>

</head>

<body>

<header>

開運コンパス

<div class="sub">
迷ったら、運気のいい方へ
</div>

</header>


<div class="container">

<h2>生年月日</h2>

<input type="date" id="birth">

<br>

<button onclick="startApp()">
今日の吉方位
</button>

<div class="result" id="direction"></div>

<div id="map"></div>


<div class="luckday" id="luckday"></div>


<h2>おみくじ</h2>

<button onclick="omikuji()">
引く
</button>

<div class="omikuji" id="omikujiResult"></div>


<div class="goshuin">

<h2>デジタル御朱印</h2>

<button onclick="checkin()">
参拝チェックイン
</button>

<div id="stamp"></div>

</div>

<br>

<button onclick="shareLuck()">
SNSシェア
</button>

</div>



<script>

let map
let userLocation
let luckyDirection


function startApp(){

calculateStar()
getLuckyDirection()
initMap()
showLuckDay()

}



function calculateStar(){

const birth=document.getElementById("birth").value

if(!birth){

alert("生年月日を入力")

return

}

}



function getLuckyDirection(){

const directions=[
"北","北東","東","南東",
"南","南西","西","北西"
]

luckyDirection=directions[Math.floor(Math.random()*8)]

document.getElementById("direction").innerHTML=
"今日の最大吉方位： "+luckyDirection

}



function initMap(){

navigator.geolocation.getCurrentPosition(pos=>{

userLocation={
lat:pos.coords.latitude,
lng:pos.coords.longitude
}

map=new google.maps.Map(
document.getElementById("map"),
{
zoom:13,
center:userLocation
}
)

new google.maps.Marker({

position:userLocation,
map:map,
title:"現在地"

})

drawLuckyBeam()

searchShrines()

})

}



function drawLuckyBeam(){

const circle=new google.maps.Circle({

strokeColor:"#FFD700",
strokeOpacity:0.8,
strokeWeight:2,
fillColor:"#FFD700",
fillOpacity:0.15,
map:map,
center:userLocation,
radius:3000

})

}



function searchShrines(){

const service=new google.maps.places.PlacesService(map)

service.textSearch({

query:"神社"

},function(results,status){

if(status===google.maps.places.PlacesServiceStatus.OK){

for(let i=0;i<results.length;i++){

new google.maps.Marker({

map:map,
position:results[i].geometry.location,
icon:"https://maps.google.com/mapfiles/kml/shapes/temple.png"

})

}

}

})

}



function omikuji(){

const messages=[

"北：静観の時。焦らず待て",
"東：行動の時。進め",
"南：人気運上昇",
"西：金運の気配",
"北東：変化の兆し",
"南東：縁が広がる",
"南西：家庭運良好",
"北西：仕事運上昇"

]

const result=messages[Math.floor(Math.random()*messages.length)]

document.getElementById("omikujiResult").innerText=result

}



function checkin(){

navigator.geolocation.getCurrentPosition(pos=>{

const lat=pos.coords.latitude
const lng=pos.coords.longitude

const dist=Math.random()*100

if(dist<80){

document.getElementById("stamp").innerHTML=
"⛩ 御朱印GET！"

}else{

document.getElementById("stamp").innerHTML=
"神社境内でチェックインしてください"

}

})

}



function showLuckDay(){

const today=new Date()

document.getElementById("luckday").innerHTML=
"今日も行動が運気を呼びます"

}



function shareLuck(){

if(navigator.share){

navigator.share({

title:"開運コンパス",
text:"今日の吉方位："+luckyDirection,
url:location.href

})

}

}



if('serviceWorker' in navigator){

navigator.serviceWorker.register('./sw.js')

}

</script>



<script async defer
src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAP_API_KEY&libraries=places&callback=initMap">
</script>


</body>
</html>
