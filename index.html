<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>開運コンパス</title>

<link rel="manifest" href="manifest.json">

<style>

body{
margin:0;
font-family:sans-serif;
background:#070707;
color:white;
text-align:center;
}

header{
background:linear-gradient(45deg,#d4af37,#ffd700);
color:black;
padding:20px;
font-size:28px;
font-weight:bold;
}

.sub{
font-size:14px;
}

.container{
padding:20px;
}

input,button{
padding:12px;
margin:10px;
border-radius:10px;
border:none;
font-size:16px;
}

button{
background:#ffd700;
font-weight:bold;
}

#map{
height:420px;
margin-top:20px;
border-radius:10px;
}

.result{
font-size:24px;
color:#ffd700;
margin-top:15px;
}

.star{
font-size:18px;
margin-top:5px;
}

.omikuji{
font-size:20px;
margin-top:15px;
color:#ffd700;
}

.goshuin{
margin-top:25px;
border:2px solid gold;
padding:20px;
border-radius:10px;
}

.luckday{
margin-top:20px;
color:#ffd700;
font-size:18px;
}

</style>

</head>

<body>

<header>

開運コンパス

<div class="sub">
迷ったら運気のいい方へ
</div>

</header>

<div class="container">

<h2>生年月日</h2>

<input type="date" id="birth">

<br>

<button onclick="startApp()">
吉方位を見る
</button>

<div class="star" id="star"></div>

<div class="result" id="direction"></div>

<div id="map"></div>

<div class="luckday" id="luckday"></div>


<h2>おみくじ</h2>

<button onclick="drawOmikuji()">
引く
</button>

<div id="omikujiResult" class="omikuji"></div>


<div class="goshuin">

<h2>デジタル御朱印</h2>

<button onclick="checkin()">
参拝チェックイン
</button>

<div id="stamp"></div>

</div>

<br>

<button onclick="shareLuck()">
SNSシェア
</button>

</div>



<script>

let map
let userLocation
let luckyDirection


function startApp(){

calculateStar()

calculateDirection()

initMap()

showLuckDay()

}



function calculateStar(){

const birth=document.getElementById("birth").value

if(!birth){

alert("生年月日を入力してください")

return

}

const year=parseInt(birth.split("-")[0])

const num=(11-(year%9))

const star=num>9?num-9:num

document.getElementById("star").innerHTML=
"あなたの本命星："+star+"白星"

}



function calculateDirection(){

const directions=[
"北","北東","東","南東",
"南","南西","西","北西"
]

luckyDirection=directions[Math.floor(Math.random()*8)]

document.getElementById("direction").innerHTML=
"今日の最大吉方位："+luckyDirection

}



function initMap(){

navigator.geolocation.getCurrentPosition(pos=>{

userLocation={
lat:pos.coords.latitude,
lng:pos.coords.longitude
}

map=new google.maps.Map(
document.getElementById("map"),
{
zoom:13,
center:userLocation
}
)

new google.maps.Marker({

position:userLocation,
map:map,
title:"現在地"

})

drawLuckyZone()

searchShrines()

})

}



function drawLuckyZone(){

new google.maps.Circle({

strokeColor:"#FFD700",
strokeOpacity:0.8,
strokeWeight:2,
fillColor:"#FFD700",
fillOpacity:0.15,
map:map,
center:userLocation,
radius:3000

})

}



function searchShrines(){

const service=new google.maps.places.PlacesService(map)

service.textSearch({

query:"神社"

},function(results,status){

if(status===google.maps.places.PlacesServiceStatus.OK){

for(let i=0;i<results.length;i++){

new google.maps.Marker({

map:map,
position:results[i].geometry.location,
icon:"https://maps.google.com/mapfiles/kml/shapes/temple.png"

})

}

}

})

}



function drawOmikuji(){

const list=[

"大吉：行動すると道が開く",
"中吉：準備を整える時",
"吉：出会い運あり",
"末吉：焦らず進め",
"小吉：小さな幸せ",
"凶：今日は静観"

]

const result=list[Math.floor(Math.random()*list.length)]

document.getElementById("omikujiResult").innerText=result

}



function checkin(){

navigator.geolocation.getCurrentPosition(pos=>{

const chance=Math.random()

if(chance>0.3){

document.getElementById("stamp").innerHTML=
"⛩ 御朱印GET！"

}else{

document.getElementById("stamp").innerHTML=
"神社境内でチェックインしてください"

}

})

}



function showLuckDay(){

document.getElementById("luckday").innerHTML=
"天赦日・一粒万倍日を狙うとさらに開運"

}



function shareLuck(){

if(navigator.share){

navigator.share({

title:"開運コンパス",
text:"今日の吉方位："+luckyDirection,
url:location.href

})

}

}



if('serviceWorker' in navigator){

navigator.serviceWorker.register('./sw.js')

}

</script>



<script async defer
src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAP_API_KEY&libraries=places&callback=initMap">
</script>


</body>
</html>
