<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>吉方位マップ Pro | 七赤金星</title>
    <style>
        body, html { height: 100%; margin: 0; font-family: 'Hiragino Sans', sans-serif; }
        #map { height: 70%; width: 100%; }
        #panel { height: 30%; padding: 15px; background: #fff; overflow-y: auto; border-top: 3px solid #f39c12; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }
        .btn-shrine { background: #e74c3c; }
        .btn-food { background: #27ae60; }
        .spot-card { border-bottom: 1px solid #eee; padding: 10px 0; }
        .info-text { font-size: 12px; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="panel">
    <div style="font-weight: bold; font-size: 16px; margin-bottom: 10px;">
        1966.06.27 七赤金星の吉方位地図
    </div>
    <div class="info-text">
        地図をタップして自宅をピン留めしてください。<br>
        磁北（西偏7°）補正済みの30/60度方位線を表示します。
    </div>
    <div class="btn-group">
        <button class="btn btn-shrine" onclick="searchSpots('shrine')">⛩ 神社を探す</button>
        <button class="btn btn-food" onclick="searchSpots('restaurant')">🍴 飲食スポット</button>
    </div>
    <div id="results"></div>
</div>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCBzk1mv7n0qNsSUpaG1mdtgPh_UV5K7zM&libraries=places,geometry"></script>

<script>
    let map, homeMarker;
    let polylines = [];
    const declination = -7.5; // 磁北補正（西偏）

    function initMap() {
        // 初期位置を西宮市付近に設定
        const startPos = { lat: 34.737, lng: 135.341 };
        
        map = new google.maps.Map(document.getElementById("map"), {
            center: startPos,
            zoom: 13, // 街がはっきり見えるズームレベル
            mapTypeControl: false,
            streetViewControl: false
        });

        // 地図をクリックした時に自宅を設定
        map.addListener("click", (e) => {
            setHome(e.latLng);
        });
    }

    function setHome(latLng) {
        if (homeMarker) homeMarker.setMap(null);
        
        homeMarker = new google.maps.Marker({
            position: latLng,
            map: map,
            label: { text: "自宅", fontWeight: "bold" },
            animation: google.maps.Animation.DROP
        });

        drawDirectionLines(latLng);
    }

    function drawDirectionLines(center) {
        polylines.forEach(p => p.setMap(null));
        polylines = [];

        // 30度と60度の交互配置（北30-北東60-東30...）
        const config = [
            { deg: 30, color: '#FF0000', label: '北' },
            { deg: 60, color: '#FF8C00', label: '北東' },
            { deg: 30, color: '#008000', label: '東' },
            { deg: 60, color: '#FFFF00', label: '南東' },
            { deg: 30, color: '#FF4500', label: '南' },
            { deg: 60, color: '#800080', label: '南西' },
            { deg: 30, color: '#DAA520', label: '西' },
            { deg: 60, color: '#00CED1', label: '北西' }
        ];

        let currentAngle = declination - 15; // 北の30度幅の開始点

        config.forEach((item) => {
            // 方位の境界線を引く
            const path = [
                center,
                google.maps.spherical.computeOffset(center, 20000, currentAngle)
            ];

            const line = new google.maps.Polyline({
                path: path,
                strokeColor: item.color,
                strokeOpacity: 0.8,
                strokeWeight: 4, // 線を太くして見やすく
                map: map
            });
            polylines.push(line);
            
            currentAngle += item.deg;
        });
        
        // 最後に閉じるための線
        const lastLine = new google.maps.Polyline({
            path: [center, google.maps.spherical.computeOffset(center, 20000, currentAngle)],
            strokeColor: '#FF0000',
            strokeOpacity: 0.8,
            strokeWeight: 4,
            map: map
        });
        polylines.push(lastLine);
    }

    function searchSpots(type) {
        if (!homeMarker) {
            alert("まず地図上をタップして自宅を設定してください。");
            return;
        }

        const service = new google.maps.places.PlacesService(map);
        const request = {
            location: homeMarker.getPosition(),
            radius: '3000',
            keyword: type === 'shrine' ? '神社' : 'レストラン'
        };

        service.nearbySearch(request, (results, status) => {
            if (status === google.maps.places.PlacesServiceStatus.OK) {
                let html = "";
                results.slice(0, 8).forEach(place => {
                    html += `<div class="spot-card"><strong>${place.name}</strong><br><span style="font-size:12px;">★ ${place.rating || '--'} | ${place.vicinity}</span></div>`;
                    
                    new google.maps.Marker({
                        position: place.geometry.location,
                        map: map,
                        title: place.name,
                        icon: {
                            url: "http://maps.google.com/mapfiles/ms/icons/blue-dot.png"
                        }
                    });
                });
                document.getElementById("results").innerHTML = html;
            }
        });
    }

    window.onload = initMap;
</script>
</body>
</html>
